<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CCET Portal - Identify Account</title>
    <style>
        body { background: #0f172a; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .glass-box { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 16px; width: 360px; color: white; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h2 { margin-top: 0; color: #ff7b00; font-weight: 500; }
        p { color: #ccc; font-size: 14px; margin-bottom: 20px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 12px; color: #aaa; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: linear-gradient(90deg, #ff7b00, #ff4500); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .links { text-align: center; margin-top: 15px; font-size: 13px; }
        .links a { color: #aaa; text-decoration: none; }
        .links a:hover { color: #ff7b00; }
        .flash-msg { background: rgba(231, 76, 60, 0.2); border: 1px solid #e74c3c; color: #e74c3c; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="glass-box">
        <h2>🔒 Account Recovery</h2>
        <p>Enter your institutional email address to verify your account credentials.</p>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash-msg">⚠️ {{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="input-group">
                <label>Institutional Email Address</label>
                <input type="email" name="email" placeholder="username@ccet.ac.in" required>
            </div>
            <button type="submit" class="btn">Verify System Identity</button>
        </form>
        <div class="links">
            <a href="/">← Return to Login</a>
        </div>
    </div>
</body>
</html>
