<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CCET Portal - Reset Password</title>
    <style>
        body { background: #0f172a; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .glass-box { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 16px; width: 360px; color: white; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h2 { margin-top: 0; color: #2ecc71; font-weight: 500; }
        p { color: #ccc; font-size: 14px; margin-bottom: 20px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 12px; color: #aaa; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: linear-gradient(90deg, #2ecc71, #27ae60); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    </style>
</head>
<body>
    <div class="glass-box">
        <h2>🔑 Choose New Password</h2>
        <p>Identity verified! Type your new secure access password below.</p>
        <form method="POST">
            <div class="input-group">
                <label>New Passphrase String</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Overwrite Database Storage</button>
        </form>
    </div>
</body>
</html>
